<!DOCTYPE html>
<html>
<head>
    <title>Personal AI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 15px;
            font-size: 20px;
            text-align: center;
            background: #1e293b;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            max-width: 70%;
            padding: 10px;
            border-radius: 10px;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
        }

        .ai {
            background: #334155;
            margin-right: auto;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #1e293b;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        button {
            margin-left: 10px;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #22c55e;
            color: black;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        🧠 Yash's Personal AI
    </div>

    <div id="chat" class="chat-box"></div>

    <div class="input-area">
        <input id="prompt" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
async function sendMessage() {
    const input = document.getElementById("prompt");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const loadingMsg = addMessage("⏳ Thinking...", "ai");

    try {
        const res = await fetch(`http://127.0.0.1:8000/ask?prompt=${encodeURIComponent(text)}`);

        if (!res.ok) {
            throw new Error("Server error");
        }

        const data = await res.json();

        loadingMsg.innerText = data.response || "No response from AI";

    } catch (err) {
        loadingMsg.innerText = "❌ Error: Backend not responding";
        console.error("FETCH ERROR:", err);
    }
}

// ✅ FIX: prevent double trigger / reload
document.getElementById("prompt").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();   // ⭐ VERY IMPORTANT
        sendMessage();
    }
});

function addMessage(text, type) {
    const chat = document.getElementById("chat");

    const msg = document.createElement("div");
    msg.className = `message ${type}`;
    msg.innerText = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;

    return msg;
}
</script>

</body>
</html>
